name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Shell syntax
        run: bash -n install.sh verify.sh check-updates.sh update.sh uninstall.sh

      - name: Node syntax
        run: |
          node --check lib/installer.js
          node --check bin/agentic-supercharge.js
          node --check scripts/check-consistency.js
          node --check scripts/evaluate-router.js

      - name: Consistency and router benchmark checks
        run: |
          npm run consistency
          npm run eval:router

      - name: Package dry run
        run: npm pack --dry-run

      - name: Installer dry runs
        run: |
          ./install.sh --list-targets
          ./install.sh --scope local --project-dir /tmp/test-agentic-default --dry-run --skip-upstream --skip-official-installers
          ./install.sh --scope global --tools agents --force-targets --conflict preserve --dry-run --skip-upstream --skip-official-installers
          ./install.sh --scope local --project-dir /tmp/test-agentic-local --conflict preserve --dry-run --skip-upstream --skip-official-installers
          test -z "$(find /tmp/test-agentic-local -type f 2>/dev/null || true)"
          ./uninstall.sh --scope global --tools agents --force-targets --dry-run

      - name: Local temp install and verify
        run: |
          ./install.sh --scope local --project-dir /tmp/test-agentic-verify --conflict preserve --skip-upstream --skip-official-installers --yes
          ./verify.sh --scope local --project-dir /tmp/test-agentic-verify --skip-upstream --skip-official-installers

      - name: Secret and local-path scan
        run: |
          ! rg -n "/Users/stefan|Codex Skills Setup|xserpentgaming|stefandumitru2002" . \
            -g '!sources.lock.json' -g '!.git/**'
          ! rg -n "gho_[A-Za-z0-9_]+|sk-[A-Za-z0-9_-]{20,}|BEGIN [A-Z ]*PRIVATE KEY|service_role[_-]?key\\s*[:=]|api[_-]?key\\s*[:=]\\s*['\"][A-Za-z0-9]|Bearer [A-Za-z0-9]{20,}" -S . \
            -g '!sources.lock.json' -g '!.git/**'
          test -z "$(find . -maxdepth 6 \( -name '.env*' -o -name '.mcp.json' -o -name 'credentials.json' -o -name 'token.json' -o -name '*.key' -o -name '*oauth*' -o -name 'cookies*' \) -not -path './.git/*')"
